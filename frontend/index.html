<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Luxe Property Agent</title>
    <link rel="stylesheet" href="style.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
</head>

<body>
    <div class="app-container">
        <!-- Sidebar / Header Area -->
        <header class="sidebar">
            <div class="logo">
                <i class="fa-solid fa-building-user"></i>
                <h1>LuxeEstate <span class="highlight">AI</span></h1>
            </div>
            <p class="tagline">Your personal premium real estate concierge.</p>
        </header>

        <!-- Main Chat Area -->
        <main class="chat-interface">
            <div class="chat-container" id="chat-container">
                <!-- Initial greeting will be fetched from backend -->
            </div>

            <!-- Input Area -->
            <div class="input-area">
                <div class="input-wrapper">
                    <input type="text" id="user-input" placeholder="Describe your dream home..." autocomplete="off">
                    <button id="send-btn"><i class="fa-solid fa-paper-plane"></i></button>
                </div>
            </div>
        </main>
    </div>
    <script src="app.js"></script>
</body>

</html>
